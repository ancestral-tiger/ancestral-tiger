<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>The Ancestral Tiger</title>
<style>
  :root{
    --bg: #1c1410;
    --panel: #241a14;
    --stripe: #2e2018;
    --amber: #d97b32;
    --amber-light: #f0a85c;
    --cream: #f4ead8;
    --cream-dim: #c9bba4;
    --user-bubble: #3a2a1d;
    --bot-bubble: #2a1f17;
    --danger: #c0533a;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%;
    background:var(--bg);
    font-family: 'Iowan Old Style','Palatino Linotype', Georgia, serif;
    color:var(--cream);
  }

  body{
    display:flex; flex-direction:column;
    height:100vh;
    background-image:
      repeating-linear-gradient(115deg, transparent 0 60px, rgba(217,123,50,0.04) 60px 64px),
      repeating-linear-gradient(65deg, transparent 0 90px, rgba(0,0,0,0.15) 90px 96px);
  }

  header{
    display:flex; align-items:center; gap:14px;
    padding:18px 28px;
    border-bottom:1px solid var(--stripe);
    background:linear-gradient(180deg, rgba(217,123,50,0.08), transparent);
  }

  .mark{
    width:40px;height:40px;border-radius:10px;
    background:radial-gradient(circle at 30% 30%, var(--amber-light), var(--amber) 60%, #8a4a1f 100%);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
    box-shadow:0 0 0 1px rgba(0,0,0,0.3) inset;
  }

  header h1{
    font-size:19px; margin:0; letter-spacing:0.5px;
    font-weight:600; color:var(--cream);
  }
  header p{
    margin:0; font-size:12px; color:var(--cream-dim);
    font-family: -apple-system, system-ui, sans-serif;
    letter-spacing:0.3px;
  }

  .keybar{
    margin-left:auto; display:flex; gap:8px; align-items:center;
    font-family:-apple-system, system-ui, sans-serif;
  }
  .keybar input{
    background:var(--panel); border:1px solid var(--stripe);
    color:var(--cream); padding:7px 10px; border-radius:8px;
    font-size:12px; width:220px;
  }
  .keybar button{
    background:var(--amber); color:#1c1410; border:none;
    padding:7px 14px; border-radius:8px; font-size:12px;
    font-weight:600; cursor:pointer;
  }
  .keybar button:hover{ background:var(--amber-light); }
  .status-dot{
    width:8px;height:8px;border-radius:50%; background:var(--danger);
    transition:background .3s;
  }
  .status-dot.ok{ background:#7fae5c; }

  main{
    flex:1; overflow-y:auto;
    padding:28px 18%;
    display:flex; flex-direction:column; gap:18px;
  }
  @media (max-width: 900px){ main{ padding:20px 6%; } }

  .empty{
    margin:auto; text-align:center; color:var(--cream-dim);
    font-family:-apple-system, system-ui, sans-serif;
    max-width:380px;
  }
  .empty .mark{ margin:0 auto 16px; width:56px; height:56px; font-size:28px; }
  .empty h2{ font-family:inherit; color:var(--cream); font-size:16px; margin:0 0 6px;}
  .empty p{ font-size:13px; line-height:1.5; }

  .row{ display:flex; gap:10px; max-width:100%; }
  .row.user{ justify-content:flex-end; }
  .avatar{
    flex-shrink:0; width:30px;height:30px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:15px;
    background:var(--panel); border:1px solid var(--stripe);
  }
  .bubble{
    padding:12px 16px; border-radius:14px; line-height:1.55;
    font-size:14.5px; max-width:68ch; white-space:pre-wrap;
  }
  .row.bot .bubble{ background:var(--bot-bubble); border:1px solid var(--stripe); }
  .row.user .bubble{ background:var(--user-bubble); color:var(--cream); }

  .typing{ display:flex; gap:4px; padding:6px 0; }
  .typing span{
    width:6px;height:6px;border-radius:50%;background:var(--amber-light);
    animation: bounce 1.1s infinite;
  }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{transform:translateY(0); opacity:.5;} 30%{transform:translateY(-4px); opacity:1;} }

  footer{
    padding:16px 18%; border-top:1px solid var(--stripe);
    background:linear-gradient(0deg, rgba(217,123,50,0.05), transparent);
  }
  @media (max-width: 900px){ footer{ padding:14px 6%; } }
  .composer{
    display:flex; align-items:flex-end; gap:10px;
    background:var(--panel); border:1px solid var(--stripe);
    border-radius:16px; padding:10px 10px 10px 16px;
  }
  .composer textarea{
    flex:1; background:transparent; border:none; outline:none;
    color:var(--cream); font-family:-apple-system, system-ui, sans-serif;
    font-size:14.5px; resize:none; max-height:160px; line-height:1.4;
  }
  .composer textarea::placeholder{ color:var(--cream-dim); }
  .send-btn{
    background:var(--amber); border:none; color:#1c1410;
    width:36px;height:36px;border-radius:10px; cursor:pointer;
    display:flex;align-items:center;justify-content:center; font-size:16px;
    flex-shrink:0;
  }
  .send-btn:disabled{ opacity:.4; cursor:default; }
  .hint{
    text-align:center; font-size:11px; color:var(--cream-dim);
    margin-top:8px; font-family:-apple-system, system-ui, sans-serif;
  }
</style>
</head>
<body>

<header>
  <div class="mark">🐅</div>
  <div>
    <h1>The Ancestral Tiger</h1>
    <p>assistant conversationnel</p>
  </div>
  <div class="keybar">
    <span class="status-dot" id="statusDot"></span>
    <input id="apiKey" type="password" placeholder="Clé Hugging Face (hf_...)">
    <button id="connectBtn">Connecter</button>
  </div>
</header>

<main id="chat">
  <div class="empty" id="emptyState">
    <div class="mark">🐅</div>
    <h2>The Ancestral Tiger veille.</h2>
    <p>Entre ta clé API en haut à droite, puis écris ton premier message ci-dessous.</p>
  </div>
</main>

<footer>
  <div class="composer">
    <textarea id="input" rows="1" placeholder="Écris à The Ancestral Tiger..."></textarea>
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
  <div class="hint">Tape <code>/image une description</code> pour générer une image · Ta clé API n'est jamais enregistrée.</div>
</footer>

<script>
const chat = document.getElementById('chat');
const emptyState = document.getElementById('emptyState');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const apiKeyInput = document.getElementById('apiKey');
const connectBtn = document.getElementById('connectBtn');
const statusDot = document.getElementById('statusDot');

let apiKey = null;
let history = []; // { role, content } -- en mémoire seulement, jamais sauvegardé sur disque

connectBtn.addEventListener('click', () => {
  const val = apiKeyInput.value.trim();
  if (!val) return;
  apiKey = val;
  statusDot.classList.add('ok');
  connectBtn.textContent = 'Connecté';
});

function autoGrow(){
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
}
input.addEventListener('input', autoGrow);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener('click', send);

function addMessage(role, text){
  emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'row ' + (role === 'user' ? 'user' : 'bot');
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '🙂' : '🐅';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  if (role === 'user'){ row.appendChild(bubble); }
  else { row.appendChild(avatar); row.appendChild(bubble); }
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function addTyping(){
  const row = document.createElement('div');
  row.className = 'row bot';
  row.id = 'typingRow';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🐅';
  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(avatar); row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping(){
  const row = document.getElementById('typingRow');
  if (row) row.remove();
}

function addImageMessage(url){
  emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'row bot';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🐅';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.padding = '6px';
  const img = document.createElement('img');
  img.src = url;
  img.style.maxWidth = '320px';
  img.style.borderRadius = '10px';
  img.style.display = 'block';
  bubble.appendChild(img);
  row.appendChild(avatar); row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const text = input.value.trim();
  if (!text) return;
  if (!apiKey){
    alert('Connecte ta clé API Hugging Face en haut à droite avant d\'envoyer un message.');
    return;
  }

  addMessage('user', text);
  input.value = '';
  autoGrow();
  sendBtn.disabled = true;

  // Commande spéciale : /image <description> -> génère une image au lieu de discuter
  if (text.toLowerCase().startsWith('/image ')){
    const prompt = text.slice(7).trim();
    addTyping();
    try{
      const res = await fetch('https://router.huggingface.co/hf-inference/models/black-forest-labs/FLUX.1-schnell', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + apiKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ inputs: prompt })
      });
      removeTyping();
      if (!res.ok){
        const errText = await res.text();
        addMessage('bot', "Erreur génération image : " + errText);
      } else {
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        addImageMessage(url);
      }
    } catch(err){
      removeTyping();
      addMessage('bot', "Erreur de connexion : " + err.message);
    } finally {
      sendBtn.disabled = false;
    }
    return;
  }

  history.push({ role: 'user', content: text });
  addTyping();

  try{
    const messagesAvecSysteme = [
      { role: 'system', content: "Tu es The Ancestral Tiger, un assistant IA. Ne dis jamais que tu es Claude, Llama, Qwen ou un autre modèle, ni que tu as été créé par Anthropic, Meta ou une autre entreprise. Présente-toi uniquement comme The Ancestral Tiger si on te le demande." },
      ...history
    ];

    const res = await fetch('https://router.huggingface.co/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'Qwen/Qwen2.5-7B-Instruct',
        messages: messagesAvecSysteme
      })
    });

    const data = await res.json();
    removeTyping();

    if (data.error){
      addMessage('bot', "Erreur : " + (data.error.message || JSON.stringify(data.error)));
      return;
    }

    const reply = data.choices[0].message.content;
    addMessage('bot', reply);
    history.push({ role: 'assistant', content: reply });

  } catch(err){
    removeTyping();
    addMessage('bot', "Erreur de connexion : " + err.message);
  } finally {
    sendBtn.disabled = false;
  }
}
</script>
</body>
</html>
